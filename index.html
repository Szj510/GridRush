<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy
      Notes:
      • 'unsafe-inline' is required by Tailwind CDN (JIT compiles styles at runtime).
      • 'unsafe-eval' is intentionally omitted — Tailwind CDN emits a console warning
        but still renders correctly without it in modern browsers.
      • script-src covers the app bundle ('self'), Tailwind CDN, PeerJS CDN, and the
        esm.sh importmap used during development.
      • connect-src restricts WebSocket / XHR to PeerJS signalling servers only.
      • frame-src / object-src / base-uri block clickjacking and base-tag injection.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src  'self' 'unsafe-inline' https://unpkg.com https://cdn.tailwindcss.com https://esm.sh;
      style-src   'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
      font-src    'self' data: https://fonts.gstatic.com;
      connect-src 'self' wss://*.peerjs.com https://*.peerjs.com;
      img-src     'self' data: blob:;
      frame-src   'none';
      object-src  'none';
      base-uri    'self';
    " />
    <title>GridRush: 9-Cell Battle</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              primary: { DEFAULT: '#3b82f6', dark: '#60a5fa' },
              secondary: { DEFAULT: '#ef4444', dark: '#f87171' },
            },
            animation: {
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'bounce-sm': 'bounce 1s infinite',
            }
          }
        }
      }
    </script>
    <style>
      body {
        /* Default to light mode background */
        background-color: #f8fafc;
        color: #1e293b;
        overflow: hidden;
        touch-action: none;
        font-family: 'Inter', sans-serif;
        transition: background-color 0.3s, color 0.3s;
      }
      
      /* Dark mode overrides handled by Tailwind 'dark:' class on html/body wrapper */
      
      /* Custom scrollbar hide */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
